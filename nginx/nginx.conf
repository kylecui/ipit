upstream tire_backend {
    server tirev2-app:8000;
}

server {
    listen 80;
    server_name _;

    # ─── 安全头 ───────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ─── IP 白名单（取消注释以启用） ──────────────────────────
    # 仅允许特定 IP 段访问，其他全部拒绝
    # allow 10.0.0.0/8;        # 内网 A 类
    # allow 172.16.0.0/12;     # 内网 B 类
    # allow 192.168.0.0/16;    # 内网 C 类
    # allow 你的公司公网IP/32;  # 公司出口 IP
    # deny all;

    # ─── 请求大小限制 ─────────────────────────────────────────
    client_max_body_size 10m;

    # ─── 限速（防止滥用） ────────────────────────────────────
    # 需要在 http 块中添加: limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://tire_backend;
    # }

    # ─── 健康检查（不记日志） ─────────────────────────────────
    location /healthz {
        access_log off;
        proxy_pass http://tire_backend;
        add_header X-Frame-Options         "DENY" always;
    }

    location /readyz {
        access_log off;
        proxy_pass http://tire_backend;
        add_header X-Frame-Options         "DENY" always;
    }

    location ^~ /reports/view/ {
        proxy_pass http://tire_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options         "SAMEORIGIN" always;
    }

    location ^~ /v2/reports/view/ {
        proxy_pass http://tire_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options         "SAMEORIGIN" always;
    }

    # ─── 主代理 ──────────────────────────────────────────────
    location / {
        proxy_pass http://tire_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（威胁情报查询可能较慢）
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    10s;
        add_header X-Frame-Options         "DENY" always;
    }

    # ─── 隐藏敏感路径 ────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
