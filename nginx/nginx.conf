upstream tire_backend {
    server tirev2-app:8000;
}

server {
    listen 80;
    server_name tire.rswitch.dev;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name tire.rswitch.dev;

    ssl_certificate /etc/letsencrypt/live/tire.rswitch.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tire.rswitch.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    client_max_body_size 10m;

    location ^~ /reports/view/ {
        proxy_pass http://tire_backend/reports/view/;
        add_header X-Frame-Options SAMEORIGIN always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 10s;
    }

    location /healthz {
        access_log off;
        proxy_pass http://tire_backend;
        add_header X-Frame-Options DENY always;
    }

    location /readyz {
        access_log off;
        proxy_pass http://tire_backend;
        add_header X-Frame-Options DENY always;
    }

    location / {
        proxy_pass http://tire_backend;
        add_header X-Frame-Options DENY always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 10s;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/tire.rswitch.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tire.rswitch.dev/privkey.pem;
    return 444;
}
