services:
  # ─── TIRE v2 应用服务 ─────────────────────────────────────────
  tirev2-app:
    build: .
    container_name: tirev2-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 持久化缓存数据库（避免每次重启丢失缓存）
      - tirev2-cache:/app/cache
      # 挂载规则文件（方便热更新规则而无需重建镜像）
      - ./rules:/app/rules:ro
    networks:
      - tirev2-net
    # 不直接暴露端口，通过 v1 的 Nginx 反代访问 (/v2)
    expose:
      - "8000"

volumes:
  tirev2-cache:
    driver: local

networks:
  tirev2-net:
    driver: bridge
